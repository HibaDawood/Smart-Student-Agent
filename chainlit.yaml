# Welcome to Your AI Assistant! 🤖

This is your personal AI chatbot with persistent chat history. Your conversations are automatically saved and you can access them anytime.

## Features:
- 💬 **Persistent Chat History** - All your conversations are saved
- 🆕 **Multiple Sessions** - Create new chats anytime  
- 📂 **Easy Navigation** - Switch between different conversations
- 🗑️ **Session Management** - Delete unwanted chats
- 🔄 **Auto-Save** - Everything saves automatically

## How to Use:
1. Start chatting normally
2. Use the sidebar to create new chats or load previous ones
3. Your chat history will persist even after page refresh
4. Click on any previous chat to continue the conversation

Enjoy chatting! 🚀
